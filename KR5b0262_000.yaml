front:
  text: 靈寶淨明院真師密誥天樞院録事羅照先奉真師玉旨判下淨明院周演教真公等九祖六親仙職下落今具本司契勘到下項
  hash: sha256:37984f51b3f01275059bcab9c188100799ec940e3c46bb4abaecceac89188be9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0262_HFL_000-001a, image: hfl/0315/0315-014.png}
body:
  text: 祖諱賢紫微殿善簿判官祖諱遵禮酆都左大判官祖諱伯通保命真人玉皇殿祖諱瓊妙應真人玉清宫祖諱哲志孝真人祖諱敬述祥光真人祖諱嘉正志道真人上清宫祖諱彥先普惠真人上清宫祖諱濤太微西度元君玉清宫父諱秩東極保壽元君玉清宫鄧氏紫微殿第十一傳言金氏玉皇殿注生童子郝氏淨至仙童蔡氏運修仙童盧氏度厄仙童錢氏道君左傳言盛氏丹霞會睦元君王氏廉肅廣修元君錢氏忠養華元君史氏顯道元君巳上並係淨明院法師三人恩及者尚必法師三代及六親未有定奪謹具呈太歲巳酉三月十五日司記關昨奉教師位關傳到楊文卿真童治顚邪瘟癆巳安就平靈應真依奉祖師真旨傳付後學者用深黃者染背心一面書一道面東取氣三口呪曰日出靈光月映西方南北二斗統臨紀綱保我法子百病消亡邪魔犯者立受其殃符式朱書掐寅日存日月存月斗口相對斗罡相對右取氣念呪書符存身為玉皇紫微侍側書訖掐寅再念七遍勑符當兩乳用二印當領用一印象三台背後左起印七印象斗罡星當花字上神仙辟穀服柏葉方金毛狗脊去毛白术天麻荆芥蒼术洗淨茯苓各等分右件搗羅為末用井花水為丸彈子大如服時用一丸黑豆一升用水三升三合將豆并藥一處煮令水乾為度服時將豆一撮柏葉同入口嚼下如喫盡藥豆則單喫柏葉也服之一年身上生毛長一寸服二年身上毛退服三年不飢不渴不寒不熱日行五百里水上自浮長生不死也服時忌食𣾰葉萆麻葉胡桃葉靈寶淨明院真師密誥
  hash: sha256:73cfb94b52f56479cf2e60b934d6cdd92058dac0859aa6e3bc636b2caabdd35b
